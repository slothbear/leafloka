<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeafLoka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8edf5;
    --muted: #6b7a99;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

  #app {
    display: grid;
    grid-template-rows: 52px 1fr 48px;
    height: 100vh;
    width: 100%;
  }

  /* BODY — side panel + map */
  #body {
    display: grid;
    grid-template-columns: 200px 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* HEADER */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #header-left { display: flex; align-items: center; gap: 12px; }
  #live-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(74,222,128,0.12);
    border: 1px solid rgba(74,222,128,0.3);
    padding: 3px 10px; border-radius: 99px;
    font-size: 11px; color: var(--accent); font-family: var(--mono);
    letter-spacing: 0.08em;
  }
  #live-pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  #live-pill.idle { background: rgba(107,122,153,0.12); border-color: rgba(107,122,153,0.3); color: var(--muted); }
  #live-pill.idle #live-pulse { background: var(--muted); animation: none; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  #app-title { font-family: var(--display); font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }
  #app-title span { color: var(--muted); font-weight: 400; }

  #header-right { display: flex; align-items: center; gap: 16px; }
  #location-count { font-size: 12px; color: var(--muted); }
  #location-count strong { color: var(--accent); font-size: 18px; font-family: var(--display); font-weight: 700; }

  /* MAP */
  #map-wrap { position: relative; overflow: hidden; background: var(--bg); cursor: grab; }
  #map-wrap:active { cursor: grabbing; }
  #world-svg { width: 100%; height: 100%; display: block; }
  .land { fill: #1e2d42; stroke: #2a3f5a; stroke-width: 0.5; }
  .graticule { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 0.5; }
  .dot-group { cursor: pointer; }

  /* TOOLTIP */
  #tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; padding: 10px 14px;
    font-size: 12px; line-height: 1.6; max-width: 240px; z-index: 20;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip .tt-place { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--text); }
  #tooltip .tt-weather { font-size: 13px; margin-top: 2px; color: var(--muted); }
  #tooltip .tt-count { font-size: 11px; color: var(--muted); margin-top: 4px; }
  #tooltip .tt-msgs { font-size: 11px; color: var(--muted); margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }
  #tooltip .tt-msg-line { margin-top: 3px; }
  #tooltip .tt-author { color: var(--accent2); }

  /* MAP OVERLAYS */
  #reset-zoom {
    position: absolute; top: 10px; left: 12px;
    font-size: 11px; padding: 4px 10px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  #reset-zoom.visible { opacity: 1; pointer-events: auto; }
  #zoom-hint {
    position: absolute; top: 10px; right: 12px;
    font-size: 10px; color: var(--muted);
    background: rgba(17,24,39,0.7); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; pointer-events: none;
  }
  /* MAP OPTIONS CHECKBOXES */
  #map-options {
    position: absolute; bottom: 10px; left: 12px;
    display: flex; flex-direction: column; gap: 4px;
    pointer-events: auto;
  }
  .opt-row {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: var(--muted);
    cursor: pointer; user-select: none;
  }
  .opt-row:hover { color: var(--text); }
  .opt-row input[type=checkbox] {
    accent-color: var(--accent);
    width: 12px; height: 12px; cursor: pointer; flex-shrink: 0;
  }

  #legend {
    position: absolute; bottom: 10px; left: 12px;
    position: absolute; bottom: 10px; left: 12px;
    display: flex; flex-direction: column; gap: 3px;
    background: rgba(17,24,39,0.85); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; pointer-events: none;
  }
  #legend-title { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .legend-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-icon { font-size: 13px; width: 18px; text-align: center; }

  /* LOCATION PANEL — left sidebar */
  #loc-panel {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--surface); overflow: hidden;
    min-height: 0;
  }
  #loc-header {
    padding: 8px 12px; font-size: 9px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #loc-feed {
    flex: 1; overflow-y: auto; padding: 4px 0;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  #loc-feed::-webkit-scrollbar { width: 3px; }
  #loc-feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .loc-msg {
    display: grid;
    grid-template-columns: 18px 1fr;
    grid-template-rows: auto auto;
    gap: 0 6px;
    padding: 5px 10px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: default;
  }
  .loc-msg:hover { background: rgba(96,165,250,0.07); }
  .loc-icon { font-size: 13px; grid-row: 1 / 3; align-self: center; }
  .loc-author {
    color: var(--accent2); font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .loc-place {
    color: var(--text); font-size: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* CONTROLS */
  #controls {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px; border-top: 1px solid var(--border); background: var(--bg);
  }
  #controls label { font-size: 11px; color: var(--muted); white-space: nowrap; letter-spacing: 0.05em; }
  #video-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 10px;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  #video-input:focus { border-color: var(--accent2); }
  #video-input::placeholder { color: var(--muted); }
  button {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 14px;
    font-family: var(--mono); font-size: 11px; color: var(--text);
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: var(--surface); border-color: var(--accent2); color: var(--accent2); }
  #connect-btn { border-color: rgba(74,222,128,0.4); color: var(--accent); }
  #connect-btn:hover { background: rgba(74,222,128,0.1); border-color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="live-pill" class="idle">
        <div id="live-pulse"></div>
        <span id="live-label">DEMO</span>
      </div>
      <div id="app-title">LeafLoka <span>/ live viewer locations</span></div>
    </div>
    <div id="header-right">
      <div id="location-count"><strong id="loc-num">0</strong> cities</div>
    </div>
  </div>

  <div id="body">
  <div id="loc-panel">
    <div id="loc-header">Locations</div>
    <div id="loc-feed"></div>
  </div>

  <div id="map-wrap">
    <svg id="world-svg" xmlns="http://www.w3.org/2000/svg">
      <defs><clipPath id="map-clip"><rect id="clip-rect" x="0" y="0" width="100%" height="100%"/></clipPath></defs>
      <g id="zoom-group" clip-path="url(#map-clip)">
        <g id="graticule-layer"></g>
        <g id="land-layer"></g>
        <g id="dots-layer"></g>
      </g>
    </svg>
    <div id="tooltip"></div>
    <button id="reset-zoom" onclick="resetZoom()">↺ Reset view</button>
    <div id="zoom-hint">Scroll to zoom · Drag to pan</div>
    <div id="map-options">
      <div id="map-options-boxes">
        <label class="opt-row"><input type="checkbox" id="opt-circles" checked> Show circles</label>
        <label class="opt-row"><input type="checkbox" id="opt-autozoom" checked> Auto-zoom to fit dots</label>
      </div>
      <div id="legend">
      <div id="legend-title">Weather</div>
      <div class="legend-row"><span class="legend-icon">☀️</span> sunny</div>
      <div class="legend-row"><span class="legend-icon">🌧️</span> rainy</div>
      <div class="legend-row"><span class="legend-icon">☁️</span> cloudy</div>
      <div class="legend-row"><span class="legend-icon">❄️</span> snowy / cold</div>
      <div class="legend-row"><span class="legend-icon">🌡️</span> hot</div>
      <div class="legend-row"><span class="legend-icon">💨</span> windy</div>
      <div class="legend-row"><span class="legend-icon">🌫️</span> foggy</div>
      <div class="legend-row"><span class="legend-icon">⛈️</span> stormy</div>
      <div class="legend-row"><span class="legend-icon">📍</span> no weather</div>
    </div><!-- #legend -->
    </div><!-- #map-options -->
  </div>
  </div><!-- #body -->

  <div id="controls">
    <label>VIDEO ID:</label>
    <input id="video-input" placeholder="Paste a YouTube video ID or URL" />
    <button id="connect-btn" onclick="connectToStream()">▶ Connect</button>
    <button onclick="clearMap()">Clear</button>
    <button onclick="startDemo()">Demo</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// Weather icons — keyed to canonical weather values returned by Claude
const WEATHER_ICONS = {
  sunny:'☀️', rainy:'🌧️', cloudy:'☁️', snowy:'❄️', cold:'🥶',
  hot:'🌡️', humid:'💧', windy:'💨', foggy:'🌫️', stormy:'⛈️',
  misty:'🌫️', warm:'🌤️', cool:'🌬️', clear:'🌞', default:'📍'
};

// ── D3 setup ───────────────────────────────────────────────────
const svgEl = document.getElementById('world-svg');
const mapWrap = document.getElementById('map-wrap');
const svg = d3.select(svgEl);
const zoomGroup = svg.select('#zoom-group');

// World bounds excluding Antarctica (lat capped at -57)
const WORLD_BOUNDS = { type: 'Feature', geometry: {
  type: 'Polygon',
  coordinates: [[[-179.9,83],[179.9,83],[179.9,-57],[-179.9,-57],[-179.9,83]]]
}};

function makeProjection(W, H) {
  // Small padding (2px each side) so coastlines aren't clipped
  return d3.geoNaturalEarth1()
    .fitExtent([[2, 2], [W - 2, H - 2]], WORLD_BOUNDS);
}

// W/H will be set properly once the container is measured
let W = 0, H = 0;
let projection = d3.geoNaturalEarth1(); // placeholder until init
let pathGen = d3.geoPath().projection(projection);

let currentTransform = d3.zoomIdentity;
const DOT_R = 10;

const zoom = d3.zoom()
  .scaleExtent([1, 50])
  .on('zoom', (event) => {
    currentTransform = event.transform;
    zoomGroup.attr('transform', currentTransform);
    rescaleAllDots();
    const isDefault = currentTransform.k === 1 && currentTransform.x === 0 && currentTransform.y === 0;
    document.getElementById('reset-zoom').classList.toggle('visible', !isDefault);
  });

svg.call(zoom);

function resetZoom() {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
}

function redraw() {
  const newW = mapWrap.clientWidth;
  const newH = mapWrap.clientHeight;
  if (newW === 0 || newH === 0) return; // not ready yet
  W = newW; H = newH;

  // Update SVG size explicitly so it matches its container
  svgEl.setAttribute('width', W);
  svgEl.setAttribute('height', H);

  projection = makeProjection(W, H);
  pathGen = d3.geoPath().projection(projection);

  svg.select('#graticule-layer').selectAll('path').attr('d', pathGen);
  svg.select('#land-layer').selectAll('path').attr('d', pathGen);

  // Reposition all dots
  svg.selectAll('.dot-group').each(function() {
    const g = d3.select(this);
    const key = g.attr('data-key');
    if (!key || !locations.has(key)) return;
    const loc = locations.get(key);
    const [cx, cy] = projection([loc.lon, loc.lat]);
    g.attr('transform', `translate(${cx},${cy})`);
  });
  resetZoom();
}

// Use ResizeObserver so we redraw as soon as the container has real dimensions
const ro = new ResizeObserver(() => redraw());
ro.observe(mapWrap);
window.addEventListener('resize', redraw);

// Graticule — append once, redraw() will update 'd' attribute
svg.select('#graticule-layer').append('path')
  .datum(d3.geoGraticule()()).attr('class', 'graticule');

// Land
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    svg.select('#land-layer').selectAll('path')
      .data(topojson.feature(world, world.objects.countries).features)
      .enter().append('path').attr('d', pathGen).attr('class', 'land');
  });

// ── State ──────────────────────────────────────────────────────
const locations = new Map();
let uid = 0;

// ── Dot sizing helpers ─────────────────────────────────────────
// All sizes are in SVG units; divide by k to get constant screen size
function svgR()    { return DOT_R / currentTransform.k; }
function svgFont() { return (DOT_R * 1.4) / currentTransform.k; }
function svgBadgeFont() { return 11 / currentTransform.k; }
function svgBadgeOffset() { return (DOT_R * 0.7) / currentTransform.k; }
function svgStroke() { return 1.5 / currentTransform.k; }

function rescaleAllDots() {
  svg.selectAll('.dot-group').each(function() {
    const g = d3.select(this);
    g.select('circle').attr('r', svgR()).attr('stroke-width', svgStroke());
    g.select('.dot-emoji').attr('font-size', svgFont());
    g.select('.count-badge')
      .attr('font-size', svgBadgeFont())
      .attr('x', svgBadgeOffset())
      .attr('y', -svgBadgeOffset());
  });
}

// ── Render / update a single dot ──────────────────────────────
function renderDot(key) {
  const loc = locations.get(key);
  const [cx, cy] = projection([loc.lon, loc.lat]);
  if (isNaN(cx) || isNaN(cy)) return;

  const icon = WEATHER_ICONS[loc.weather] || WEATHER_ICONS.default;
  const id = `dot-${loc.id}`;
  let g = svg.select('#dots-layer').select(`#${id}`);

  if (g.empty()) {
    g = svg.select('#dots-layer').append('g')
      .attr('id', id).attr('class', 'dot-group')
      .attr('data-key', key)
      .attr('transform', `translate(${cx},${cy})`);

    const showCircle = document.getElementById('opt-circles').checked;
    g.append('circle')
      .attr('r', 0)
      .attr('fill', '#4ade80').attr('fill-opacity', showCircle ? 0.2 : 0)
      .attr('stroke', '#4ade80').attr('stroke-width', svgStroke())
      .attr('stroke-opacity', showCircle ? 0.9 : 0)
      .transition().duration(500).attr('r', svgR());

    g.append('text')
      .attr('class', 'dot-emoji')
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('font-size', svgFont()).text(icon);

    g.on('mouseenter', (event) => showTooltip(event, key))
     .on('mousemove', moveTooltip)
     .on('mouseleave', hideTooltip);
  }

  // Refresh count badge
  g.select('.count-badge').remove();
  if (loc.count > 1) {
    g.append('text')
      .attr('class', 'count-badge')
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('font-size', svgBadgeFont())
      .attr('x', svgBadgeOffset()).attr('y', -svgBadgeOffset())
      .attr('fill', 'white')
      .text(loc.count);
  }
}

// ── Tooltip ────────────────────────────────────────────────────
const ttEl = document.getElementById('tooltip');

function showTooltip(event, key) {
  const loc = locations.get(key);
  const icon = WEATHER_ICONS[loc.weather] || WEATHER_ICONS.default;
  const msgs = loc.messages.slice(-3)
    .map(m => `<div class="tt-msg-line"><span class="tt-author">${esc(m.author)}:</span> ${esc(m.text)}</div>`)
    .join('');
  ttEl.innerHTML = `
    <div class="tt-place">${icon} ${esc(loc.place)}</div>
    ${loc.weather ? `<div class="tt-weather">${loc.weather}</div>` : ''}
    <div class="tt-count">${loc.count} viewer${loc.count > 1 ? 's' : ''}</div>
    <div class="tt-msgs">${msgs}</div>`;
  ttEl.style.display = 'block';
  moveTooltip(event);
}
function moveTooltip(event) {
  const rect = document.getElementById('map-wrap').getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 10;
  if (x + 250 > rect.width) x -= 264;
  if (y < 0) y = 4;
  ttEl.style.left = x + 'px'; ttEl.style.top = y + 'px';
}
function hideTooltip() { ttEl.style.display = 'none'; }

// ── Geocode ────────────────────────────────────────────────────
const geocodeCache = new Map();

async function geocode(place) {
  const key = place.toLowerCase().trim();
  if (DEMO_COORDS[key]) return DEMO_COORDS[key];
  if (geocodeCache.has(key)) return geocodeCache.get(key);
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place)}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'en', 'User-Agent': 'LeafLoka/1.0' }}
    );
    const d = await r.json();
    if (d && d[0]) {
      const result = { lat: +d[0].lat, lon: +d[0].lon };
      geocodeCache.set(key, result);
      return result;
    }
  } catch(e) {}
  return null;
}

// ── Add location entry ─────────────────────────────────────────
async function addLocation(author, text, place, weather, place_mention, weather_mention) {
  const key = place.toLowerCase().trim();
  if (locations.has(key)) {
    const loc = locations.get(key);
    loc.count++;
    loc.messages.push({ author, text });
    renderDot(key);
  } else {
    const geo = await geocode(place);
    if (!geo) return;
    locations.set(key, { id: uid++, place, lat: geo.lat, lon: geo.lon, weather, count: 1, messages: [{ author, text }] });
    renderDot(key);
  }
  document.getElementById('loc-num').textContent = locations.size;
  autoZoomToFitDots();
  addToFeed(author, text, place, weather, place_mention, weather_mention);
}

// ── Location-only feed ─────────────────────────────────────────
function highlightMentions(text, place_mention, weather_mention) {
  // Highlight the exact substrings Claude identified in the original message
  let result = esc(text);
  // Escape regex special chars in the mention strings
  function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  if (weather_mention) {
    result = result.replace(
      new RegExp('(' + escRe(esc(weather_mention)) + ')', 'i'),
      '<span class="hl-weather">$1</span>'
    );
  }
  if (place_mention) {
    result = result.replace(
      new RegExp('(' + escRe(esc(place_mention)) + ')', 'i'),
      '<span class="hl-place">$1</span>'
    );
  }
  return result;
}

function addToFeed(author, text, place, weather, place_mention, weather_mention) {
  const feed = document.getElementById('loc-feed');
  const div = document.createElement('div');
  div.className = 'loc-msg';
  const icon = WEATHER_ICONS[weather] || WEATHER_ICONS.default;
  // Compact two-line display: author on top, place (+ weather if present) below
  const weatherStr = weather ? ` <span class="hl-weather">${esc(weather)}</span>` : '';
  const placeStr = `<span class="hl-place">${esc(place)}</span>${weatherStr}`;
  div.innerHTML = `<span class="loc-icon">${icon}</span><span class="loc-author">${esc(author)}</span><span class="loc-place">${placeStr}</span>`;
  feed.appendChild(div);
  const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  if (nearBottom) feed.scrollTop = feed.scrollHeight;
}

// ── Option: circle toggle ─────────────────────────────────────
function applyCircleToggle() {
  const show = document.getElementById('opt-circles').checked;
  svg.selectAll('.dot-group circle')
    .attr('fill-opacity', show ? 0.2 : 0)
    .attr('stroke-opacity', show ? 0.9 : 0);
}
document.getElementById('opt-circles').addEventListener('change', applyCircleToggle);

// ── Option: auto-zoom to fit all dots ─────────────────────────
function autoZoomToFitDots() {
  if (!document.getElementById('opt-autozoom').checked) return;
  if (locations.size === 0) return;

  // Collect all projected coordinates
  const points = [];
  for (const loc of locations.values()) {
    const [x, y] = projection([loc.lon, loc.lat]);
    if (!isNaN(x) && !isNaN(y)) points.push([x, y]);
  }
  if (points.length === 0) return;

  // Compute bounding box with padding
  const PAD = 60;
  const xs = points.map(p => p[0]);
  const ys = points.map(p => p[1]);
  const x0 = Math.min(...xs) - PAD, x1 = Math.max(...xs) + PAD;
  const y0 = Math.min(...ys) - PAD, y1 = Math.max(...ys) + PAD;

  const bW = x1 - x0, bH = y1 - y0;
  const scale = Math.min(W / bW, H / bH, 50); // cap at max zoom
  const tx = W / 2 - scale * (x0 + bW / 2);
  const ty = H / 2 - scale * (y0 + bH / 2);

  svg.transition().duration(700)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Clear ──────────────────────────────────────────────────────
function clearMap() {
  locations.clear(); uid = 0;
  svg.select('#dots-layer').selectAll('*').remove();
  document.getElementById('loc-feed').innerHTML = '';
  document.getElementById('loc-num').textContent = '0';
  resetZoom();
}

// ── SSE connection ─────────────────────────────────────────────
let sse = null;
function connectToStream() {
  let val = document.getElementById('video-input').value.trim();
  const m = val.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_\-]{11})/);
  if (m) val = m[1];
  if (!val || val.length < 5) { alert('Enter a valid YouTube video ID or URL'); return; }
  if (sse) sse.close();
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
  clearMap();

  const backendUrl = window.BACKEND_URL || 'http://localhost:3001';
  sse = new EventSource(`${backendUrl}/stream?videoId=${encodeURIComponent(val)}`);
  sse.onopen = () => setLive('LIVE', true);
  sse.onerror = () => setLive('IDLE', false);

  sse.addEventListener('location', e => {
    const d = JSON.parse(e.data);
    addLocation(d.author, d.text, d.place, d.weather, d.place_mention, d.weather_mention);
  });

}

function setLive(label, active) {
  document.getElementById('live-pill').className = active ? '' : 'idle';
  document.getElementById('live-label').textContent = label;
}

  }
  step();
  demoTimer = setInterval(step, 1400);
}
